name: GreenMonkeys
options:
  bundleIdPrefix: com.strive4it.greenmonkeys
  createIntermediateGroups: true
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: Z454AW7UL3

targets:
  GreenMonkeys:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: GreenMonkeys
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.strive4it.greenmonkeys
        TARGETED_DEVICE_FAMILY: 1        # iPhone only
        INFOPLIST_FILE: GreenMonkeys/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "1.0.0"
        CODE_SIGN_STYLE: Automatic
    info:
      path: GreenMonkeys/Info.plist
      properties:
        CFBundleDisplayName: Green Monkeys
        NSCameraUsageDescription: "Green Monkeys uses the camera so you can record your plan, session, and morning-after videos. Videos never leave your phone."
        NSMicrophoneUsageDescription: "The microphone records sound with your videos. Recordings never leave your phone."
        NSFaceIDUsageDescription: "Face ID keeps your videos private by locking the app."
        ITSAppUsesNonExemptEncryption: false
        CFBundleURLTypes:
          - CFBundleURLName: com.strive4it.greenmonkeys
            CFBundleURLSchemes:
              - greenmonkeys
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UILaunchScreen:
          UIColorName: ""
          UIImageName: ""
    entitlements:
      path: GreenMonkeys/GreenMonkeys.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.strive4it.greenmonkeys
    dependencies:
      - target: GreenMonkeysWatch
        embed: true
      - target: GreenMonkeysWidgets
        embed: true

  GreenMonkeysWatch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: GreenMonkeysWatch
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.strive4it.greenmonkeys.watchkitapp
        INFOPLIST_FILE: GreenMonkeysWatch/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "1.0.0"
        CODE_SIGN_STYLE: Automatic
    info:
      path: GreenMonkeysWatch/Info.plist
      properties:
        CFBundleDisplayName: Green Monkeys
        WKCompanionAppBundleIdentifier: com.strive4it.greenmonkeys
        WKApplication: true
        ITSAppUsesNonExemptEncryption: false

  GreenMonkeysWidgets:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: GreenMonkeysWidgets
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.strive4it.greenmonkeys.widgets
        TARGETED_DEVICE_FAMILY: 1
        INFOPLIST_FILE: GreenMonkeysWidgets/Info.plist
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "1.0.0"
        CODE_SIGN_STYLE: Automatic
    entitlements:
      path: GreenMonkeysWidgets/GreenMonkeysWidgets.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.strive4it.greenmonkeys
    info:
      path: GreenMonkeysWidgets/Info.plist
      properties:
        CFBundleDisplayName: Green Monkeys
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  GreenMonkeysTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: GreenMonkeysTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.strive4it.greenmonkeys.tests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: GreenMonkeys
